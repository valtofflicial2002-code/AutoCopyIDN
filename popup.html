<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AutocopyIDN</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="popup">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">
                <img src="icons/icon48.png" alt="Logo">
            </div>
            <h1 class="title">Autocopy<span>IDN</span></h1>
        </div>

        <!-- CARD DEPOSIT -->
        <div id="depositCard" class="card active">
            <div class="left">
                <div class="icon">🏦</div>
                <div class="text">
                    <h3>DEPOSIT</h3>
                    <p>Mode Deposit</p>
                </div>
            </div>
            <div class="status">
                <span class="dot"></span>
                ON
            </div>
        </div>

        <!-- CARD WITHDRAW -->
        <div id="withdrawCard" class="card active">
            <div class="left">
                <div class="icon">🏛</div>
                <div class="text">
                    <h3>WITHDRAW</h3>
                    <p>Mode Withdraw</p>
                </div>
            </div>
            <div class="status">
                <span class="dot"></span>
                ON
            </div>
        </div>

        <!-- BUTTON HISTORY -->
        <div id="historyBtn" class="card">
            <div class="left">
                <div class="icon">🗄</div>
                <div class="text">
                    <h3>HISTORY COPY</h3>
                    <p>View Copy Dashboard</p>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            © 2026 AutocopyIDN • All Rights Reserved
        </div>
    </div>

    <!-- HUBUNGKAN SCRIPT DI SINI -->
    <script src="popup.js"></script>
</body>
</html>
